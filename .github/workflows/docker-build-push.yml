name: Docker Build and Push

on:
  push:
    branches: [master]
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  id-token: write
  attestations: write
  contents: read

jobs:
  # master push → staging:latest
  build-staging:
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    uses: NethermindEth/github-workflows/.github/workflows/docker-build-push-jfrog.yaml@main
    with:
      repo_name: "angkor-oci-local-staging"
      image_name: "dugtrio"
      context: "."
      dockerfile_path: "./Dockerfile"
      run_trivy: false
      platforms: "linux/amd64,linux/arm64"
      additional_tags: "latest"

  # PR → dev:pr-{number}
  build-pr:
    if: github.event_name == 'pull_request'
    uses: NethermindEth/github-workflows/.github/workflows/docker-build-push-jfrog.yaml@main
    with:
      repo_name: "angkor-oci-local-dev"
      image_name: "dugtrio"
      context: "."
      dockerfile_path: "./Dockerfile"
      run_trivy: false
      platforms: "linux/amd64,linux/arm64"
      additional_tags: "pr-${{ github.event.pull_request.number }}"

  # semver tag (e.g. 0.1.0) → prod:{tag}
  build-prod:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    uses: NethermindEth/github-workflows/.github/workflows/docker-build-push-jfrog.yaml@main
    with:
      repo_name: "angkor-oci-local-prod"
      image_name: "dugtrio"
      context: "."
      dockerfile_path: "./Dockerfile"
      run_trivy: false
      platforms: "linux/amd64,linux/arm64"
      additional_tags: "${{ github.ref_name }}"
